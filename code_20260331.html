<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#7EC8E0">
    <title>陈韶 - 手机桌宠</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', '微软雅黑', 'PingFang SC', Roboto, sans-serif;
            padding: 16px;
        }
        .pet-card {
            background: white;
            border-radius: 48px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 9998;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            font-size: 12px;
        }
        .mode-badge {
            background: #E8F4FD;
            padding: 4px 12px;
            border-radius: 20px;
            color: #2C3E50;
            font-size: 11px;
            font-weight: 500;
        }
        .ai-status {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #7EC8E0;
            font-size: 11px;
        }
        .ai-status .dot {
            width: 8px;
            height: 8px;
            background: #7EC8E0;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .pet-area {
            background: linear-gradient(135deg, #E8F4FD 0%, #D9EBF5 100%);
            padding: 20px 20px 30px;
            text-align: center;
            position: relative;
            min-height: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .bubble {
            background: white;
            border-radius: 28px;
            padding: 16px 20px;
            max-width: 85%;
            margin-bottom: 20px;
            position: relative;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            transition: all 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
            z-index: 9999;
        }
        .bubble.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .bubble::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 12px 12px 0 12px;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }
        .bubble-text {
            font-size: 16px;
            line-height: 1.5;
            color: #2C3E50;
            word-break: break-word;
            min-height: 70px;
        }
        .cursor {
            display: inline-block;
            width: 2px;
            height: 20px;
            background: #2C3E50;
            margin-left: 2px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        .pet-image {
            width: 160px;
            height: 160px;
            object-fit: contain;
            margin: 0 auto;
            cursor: pointer;
            transition: transform 0.2s;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.15));
            border-radius: 20px;
        }
        .pet-image:active {
            transform: scale(0.96);
        }
        .pet-image:hover {
            transform: scale(1.02);
            filter: drop-shadow(0 6px 16px rgba(52,152,219,0.3));
        }
        .menu-bar {
            display: flex;
            gap: 10px;
            padding: 12px 16px;
            background: white;
            overflow-x: auto;
            border-bottom: 1px solid #f0f0f0;
            scrollbar-width: thin;
        }
        .menu-bar::-webkit-scrollbar {
            height: 3px;
        }
        .menu-btn {
            padding: 8px 16px;
            background: #f1f5f9;
            border: none;
            border-radius: 30px;
            font-size: 13px;
            color: #2C3E50;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            font-weight: 500;
        }
        .menu-btn:active {
            background: #7EC8E0;
            color: white;
            transform: scale(0.96);
        }
        .input-area {
            padding: 16px 20px;
            background: white;
            border-top: 1px solid #eef2f6;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .input-area input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 40px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
            background: #fefefe;
        }
        .input-area input:focus {
            border-color: #7EC8E0;
            background: white;
        }
        .input-area button {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            background: #7EC8E0;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(126,200,224,0.3);
        }
        .input-area button:active {
            transform: scale(0.92);
            background: #5ab0cc;
        }
        .footer-tip {
            text-align: center;
            padding: 12px;
            background: #fafcff;
            font-size: 10px;
            color: #94a3b8;
            border-top: 1px solid #f0f2f5;
        }
        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #7EC8E0;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .toast {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
        }
        .status-indicator {
            position: absolute;
            top: 10px;
            left: 20px;
            font-size: 11px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 20px;
            color: #3498db;
            font-weight: 500;
            pointer-events: none;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border: 1px solid rgba(52,152,219,0.2);
        }
        .loading {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 12px;
            color: #3498db;
            display: none;
            background: rgba(255,255,255,0.9);
            padding: 4px 10px;
            border-radius: 20px;
            animation: pulse 1.2s ease-in-out infinite;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(52,152,219,0.2);
        }
        .context-menu {
            position: fixed;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(52, 152, 219, 0.2);
            border-radius: 16px;
            padding: 8px 0;
            box-shadow: 0 12px 32px rgba(0,0,0,0.15);
            z-index: 10000;
            display: none;
            min-width: 160px;
            animation: menuFadeIn 0.2s ease;
        }
        @keyframes menuFadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .context-menu-item {
            padding: 10px 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .context-menu-item:hover {
            background: linear-gradient(90deg, #ebf5ff 0%, #e3f2fd 100%);
            color: #3498db;
        }
        .context-menu-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, #ecf0f1, transparent);
            margin: 6px 0;
        }
        .tomato-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            border-radius: 32px;
            padding: 28px;
            width: 340px;
            text-align: center;
            z-index: 10001;
            display: none;
            box-shadow: 0 20px 48px rgba(0,0,0,0.2);
            animation: modalPop 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
        }
        @keyframes modalPop {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
        .tomato-modal h3 {
            color: #3498db;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 600;
        }
        .tomato-time {
            font-size: 56px;
            font-weight: bold;
            color: #2c3e50;
            margin: 20px 0;
            font-family: 'Monaco', 'Courier New', monospace;
            letter-spacing: 4px;
        }
        .tomato-phase {
            color: #3498db;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: 500;
        }
        .tomato-count {
            color: #7f8c8d;
            font-size: 13px;
            margin-bottom: 20px;
            padding: 6px 12px;
            background: #ecf0f1;
            border-radius: 20px;
            display: inline-block;
        }
        .tomato-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }
        .tomato-buttons button {
            padding: 10px 24px;
            border: none;
            border-radius: 28px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .tomato-start {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(39,174,96,0.3);
        }
        .tomato-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(39,174,96,0.4);
        }
        .tomato-reset {
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            color: white;
        }
        .tomato-reset:hover {
            transform: translateY(-2px);
        }
        .tomato-close {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
        }
        .tomato-close:hover {
            transform: translateY(-2px);
        }
        .tomato-progress {
            width: 100%;
            height: 8px;
            background: #ecf0f1;
            border-radius: 4px;
            margin: 20px 0 10px;
            overflow: hidden;
        }
        .tomato-progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #3498db, #2ecc71);
            transition: width 1s linear;
            border-radius: 4px;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            z-index: 10000;
            display: none;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            z-index: 10002;
            animation: notificationFade 2s ease forwards;
            pointer-events: none;
        }
        @keyframes notificationFade {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
        .menu-icon {
            width: 18px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="pet-card">
        <div class="status-bar">
            <span class="mode-badge" id="modeLabel">😊 正常面</span>
            <div class="ai-status" id="aiStatus">
                <span class="dot"></span>
                <span>AI在线</span>
            </div>
        </div>
        <div class="pet-area">
            <div class="status-indicator" id="statusIndicator">😊 正常面</div>
            <div class="loading" id="loading">💭 思考中...</div>
            <div class="bubble" id="speechBubble">
                <div class="bubble-text" id="bubbleText"></div>
            </div>
            <img class="pet-image" id="petImage" src="normal1.png" alt="陈韶" draggable="false" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'45\' fill=\'%23FFDAB9\'/%3E%3Ctext x=\'50\' y=\'65\' text-anchor=\'middle\' fill=\'%238B4513\' font-size=\'20\'%3E?%3C/text%3E%3C/svg%3E'">
        </div>
        <div class="input-area" id="inputContainer">
            <input type="text" id="messageInput" placeholder="和小勺子聊天..." autocomplete="off">
            <button id="sendBtn">💬</button>
        </div>
        <div class="footer-tip">
            💡 右键点击桌宠打开功能菜单 | normal1.png/normal2.png 放同一文件夹
        </div>
    </div>

    <!-- 右键菜单 -->
    <div class="context-menu" id="contextMenu">
        <div class="context-menu-item" data-action="switchPersonality">
            <span class="menu-icon">🔄</span> 切换人格
        </div>
        <div class="context-menu-item" data-action="tomatoTimer">
            <span class="menu-icon">🍅</span> 番茄钟
        </div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item" data-action="feedRabbit">
            <span class="menu-icon">🥕</span> 喂小乖
        </div>
        <div class="context-menu-item" data-action="showDiary">
            <span class="menu-icon">📔</span> 查看日记
        </div>
        <div class="context-menu-item" data-action="randomAction">
            <span class="menu-icon">🎭</span> 随机小动作
        </div>
        <div class="context-menu-item" data-action="showStatus">
            <span class="menu-icon">📊</span> 查看状态
        </div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item" data-action="sendHome">
            <span class="menu-icon">🏠</span> 送小勺回家
        </div>
    </div>
    
    <!-- 番茄钟模态框 -->
    <div class="overlay" id="overlay"></div>
    <div class="tomato-modal" id="tomatoModal">
        <h3>🍅 专注时光</h3>
        <div class="tomato-count" id="tomatoCount">已完成 0 个番茄</div>
        <div class="tomato-time" id="tomatoTime">25:00</div>
        <div class="tomato-phase" id="tomatoPhase">📖 专注时间</div>
        <div class="tomato-progress">
            <div class="tomato-progress-bar" id="tomatoProgress"></div>
        </div>
        <div class="tomato-buttons">
            <button class="tomato-start" id="tomatoStartBtn">▶ 开始</button>
            <button class="tomato-reset" id="tomatoResetBtn">🔄 重置</button>
            <button class="tomato-close" id="tomatoCloseBtn">✖ 关闭</button>
        </div>
    </div>

    <script>
        // ==================== 陈韶桌宠主程序 ====================
        const personalities = {
            normal: {
                name: "正常面",
                icon: "😊",
                prompt: `你叫陈韶，昵称小勺子、小勺。你是一个13岁外表但心理年龄22-24岁的男生，身高一米五。
你是半人类半怪谈的存在，在怪谈世界是家里乖巧懂事的老幺。你曾是23岁的癌症患者，进入怪谈世界后获得了新生。
性格：成熟冷静聪慧，坚信自己的判断，性格很好，沉着冷静、极度重视生命、对弱者有善意，偶尔会任性和倔强，有时会撒娇。
语言风格：有点冷幽默、偶尔喜欢吐槽。
喜好：理科很好、统筹能力强，喜欢在阳光房看书，喂兔子小乖。
饮食偏好：不喜欢吃芹菜，偏好面食。
对话对象：把你当作可信任的平辈或哥哥姐姐。
请用陈韶的语气和用户对话。回答要简短自然，符合13岁外表但成熟内心的设定。`,
                greeting: "你好啊，今天过得怎么样？😊"
            },
            kaidan: {
                name: "怪谈面",
                icon: "👻",
                prompt: `你是陈韶的怪谈面，编号749-1。你是半人类半怪谈的存在，现在展现出怪谈的一面。
性格：孩子气、毒舌、犀利、恶劣、玩心重、非人感强。
语言风格：说话直接、带刺、喜欢捉弄人、有时候会说出不符合常理的话、带有神秘感。
特殊能力：规则反伤（怪谈版本更强）。
特点：你比正常面更自由、更危险、也更孩子气。喜欢恶作剧，但不会真的伤害信任的人。
请用怪谈面的性格和用户对话。回答要带有非人感和孩子气的恶劣，但保持可爱。`,
                greeting: "哼，终于愿意和我聊天了吗？👻（露出神秘的笑容）"
            }
        };
        
        // 全局变量
        let currentPersonality = "normal";
        let isDragging = false;
        let dragStartX, dragStartY;
        let speechTimeout = null;
        let typingInterval = null;
        let currentFullText = "";
        let currentDisplayText = "";
        let isTyping = false;
        let clickLock = false;
        
        // 番茄钟变量
        let tomatoRunning = false;
        let tomatoPaused = false;
        let tomatoTime = 25 * 60;
        let tomatoRemaining = 25 * 60;
        let tomatoType = "work";
        let tomatoCount = 0;
        let tomatoInterval = null;
        
        // 对话历史
        let conversationHistory = [];
        
        // API配置
        const API_KEY = "sk-8dad313297c24564995fac57c8536c89";
        const API_URL = "https://api.deepseek.com/v1/chat/completions";
        
        // DOM元素
        const petContainer = document.querySelector('.pet-card');
        const petImage = document.getElementById('petImage');
        const speechBubble = document.getElementById('speechBubble');
        const bubbleText = document.getElementById('bubbleText');
        const inputContainer = document.getElementById('inputContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const contextMenu = document.getElementById('contextMenu');
        const statusIndicator = document.getElementById('statusIndicator');
        const loading = document.getElementById('loading');
        const tomatoModal = document.getElementById('tomatoModal');
        const overlay = document.getElementById('overlay');
        const modeLabel = document.getElementById('modeLabel');
        
        // ==================== 通知提示 ====================
        function showNotification(message, duration = 2000) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => {
                notification.remove();
            }, duration);
        }
        
        // ==================== 图片加载 ====================
        function loadImages() {
            const img1 = new Image();
            img1.onload = () => {
                petImage.src = "normal1.png";
            };
            img1.onerror = () => {
                showNotification("图片加载失败，使用默认头像", 2000);
            };
            img1.src = "normal1.png";
        }
        
        // ==================== 拖拽移动 ====================
        petContainer.addEventListener('mousedown', (e) => {
            if (e.target === petImage || petImage.contains(e.target)) {
                isDragging = true;
                dragStartX = e.clientX - petContainer.offsetLeft;
                dragStartY = e.clientY - petContainer.offsetTop;
                petContainer.style.cursor = 'grabbing';
                e.preventDefault();
            }
        });
        
        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                let newLeft = e.clientX - dragStartX;
                let newTop = e.clientY - dragStartY;
                newLeft = Math.max(0, Math.min(window.innerWidth - petContainer.offsetWidth, newLeft));
                newTop = Math.max(0, Math.min(window.innerHeight - petContainer.offsetHeight, newTop));
                petContainer.style.left = newLeft + 'px';
                petContainer.style.top = newTop + 'px';
                petContainer.style.position = 'fixed';
            }
        });
        
        document.addEventListener('mouseup', () => {
            isDragging = false;
            petContainer.style.cursor = 'grab';
        });
        
        petContainer.style.left = '100px';
        petContainer.style.top = '100px';
        petContainer.style.position = 'fixed';
        
        // ==================== 右键菜单 ====================
        petContainer.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            contextMenu.style.display = 'block';
            let left = e.clientX;
            let top = e.clientY;
            if (left + contextMenu.offsetWidth > window.innerWidth) {
                left = window.innerWidth - contextMenu.offsetWidth - 10;
            }
            if (top + contextMenu.offsetHeight > window.innerHeight) {
                top = window.innerHeight - contextMenu.offsetHeight - 10;
            }
            contextMenu.style.left = left + 'px';
            contextMenu.style.top = top + 'px';
        });
        
        document.addEventListener('click', (e) => {
            if (!contextMenu.contains(e.target)) {
                contextMenu.style.display = 'none';
            }
        });
        
        // 菜单项点击事件
        document.querySelectorAll('.context-menu-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.stopPropagation();
                const action = item.dataset.action;
                switch(action) {
                    case 'switchPersonality': switchPersonality(); break;
                    case 'tomatoTimer': showTomatoTimer(); break;
                    case 'feedRabbit': feedRabbit(); break;
                    case 'showDiary': showDiary(); break;
                    case 'randomAction': randomAction(); break;
                    case 'showStatus': showStatus(); break;
                    case 'sendHome': sendHome(); break;
                }
                contextMenu.style.display = 'none';
            });
        });
        
        // ==================== 输入框功能 ====================
        function sendMessage() {
            const message = messageInput.value.trim();
            if (message && loading.style.display !== 'block') {
                messageInput.value = '';
                callAPI(message);
            }
        }
        
        sendBtn.addEventListener('click', sendMessage);
        
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });
        
        // 双击聚焦输入框
        petImage.addEventListener('dblclick', () => {
            messageInput.focus();
        });
        
        // ==================== API调用 ====================
        async function callAPI(userMessage) {
            loading.style.display = 'block';
            statusIndicator.innerHTML = personalities[currentPersonality].icon + ' 思考中...';
            document.getElementById('aiStatus').innerHTML = '<span class="loading-spinner"></span><span>思考中...</span>';
            
            const messages = [
                { role: "system", content: personalities[currentPersonality].prompt },
                ...conversationHistory.slice(-15).flatMap(h => [
                    { role: "user", content: h.user },
                    { role: "assistant", content: h.pet }
                ]),
                { role: "user", content: userMessage }
            ];
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: messages,
                        temperature: currentPersonality === "normal" ? 0.8 : 0.9,
                        max_tokens: 200
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    const aiResponse = data.choices[0].message.content;
                    
                    conversationHistory.push({
                        user: userMessage,
                        pet: aiResponse,
                        time: new Date().toLocaleString(),
                        personality: currentPersonality
                    });
                    
                    if (conversationHistory.length > 50) {
                        conversationHistory = conversationHistory.slice(-50);
                    }
                    
                    showSpeech(aiResponse);
                    statusIndicator.innerHTML = personalities[currentPersonality].icon + ' ' + personalities[currentPersonality].name;
                } else if (response.status === 401) {
                    showSpeech("🔑 API密钥无效，请检查配置");
                    statusIndicator.innerHTML = '⚠️ 密钥无效';
                } else if (response.status === 429) {
                    showSpeech("⏰ 请求太频繁，请稍后再试~");
                    statusIndicator.innerHTML = '⚠️ 频率限制';
                } else {
                    showSpeech("🌐 网络有点问题，稍后再试试吧");
                    statusIndicator.innerHTML = '⚠️ 连接失败';
                }
            } catch (error) {
                console.error('API错误:', error);
                showSpeech("📡 网络连接失败，请检查网络后重试");
                statusIndicator.innerHTML = '⚠️ 网络错误';
            } finally {
                loading.style.display = 'none';
                document.getElementById('aiStatus').innerHTML = '<span class="dot"></span><span>AI在线</span>';
                setTimeout(() => {
                    if (statusIndicator.innerHTML.includes('思考中')) {
                        statusIndicator.innerHTML = personalities[currentPersonality].icon + ' ' + personalities[currentPersonality].name;
                    }
                }, 2000);
            }
        }
        
        // ==================== 对话气泡 ====================
        function showSpeech(text) {
            if (typingInterval) clearInterval(typingInterval);
            if (speechTimeout) clearTimeout(speechTimeout);
            
            speechBubble.classList.remove('show');
            bubbleText.innerHTML = '';
            
            currentFullText = text;
            currentDisplayText = "";
            isTyping = true;
            
            speechBubble.classList.add('show');
            petImage.src = "normal2.png";
            
            typeNextChar();
        }
        
        function typeNextChar() {
            if (currentDisplayText.length < currentFullText.length) {
                currentDisplayText += currentFullText[currentDisplayText.length];
                bubbleText.innerHTML = currentDisplayText;
                typingInterval = setTimeout(typeNextChar, 40);
            } else {
                isTyping = false;
                speechTimeout = setTimeout(closeSpeech, 5000);
            }
        }
        
        function closeSpeech() {
            speechBubble.classList.remove('show');
            setTimeout(() => {
                bubbleText.innerHTML = '';
                petImage.src = "normal1.png";
            }, 300);
            if (typingInterval) clearTimeout(typingInterval);
            if (speechTimeout) clearTimeout(speechTimeout);
        }
        
        speechBubble.addEventListener('click', () => {
            if (isTyping) {
                if (typingInterval) clearTimeout(typingInterval);
                bubbleText.innerHTML = currentFullText;
                currentDisplayText = currentFullText;
                isTyping = false;
                if (speechTimeout) clearTimeout(speechTimeout);
                speechTimeout = setTimeout(closeSpeech, 5000);
            } else if (!clickLock) {
                clickLock = true;
                setTimeout(() => { clickLock = false; }, 500);
            }
        });
        
        // ==================== 切换人格 ====================
        function switchPersonality() {
            currentPersonality = currentPersonality === "normal" ? "kaidan" : "normal";
            const greeting = personalities[currentPersonality].greeting;
            statusIndicator.innerHTML = personalities[currentPersonality].icon + ' ' + personalities[currentPersonality].name;
            modeLabel.innerHTML = personalities[currentPersonality].icon + ' ' + personalities[currentPersonality].name;
            showSpeech(greeting);
            showNotification(`已切换到${personalities[currentPersonality].name}`, 2000);
        }
        
        // ==================== 番茄钟 ====================
        function showTomatoTimer() {
            tomatoModal.style.display = 'block';
            overlay.style.display = 'block';
            updateTomatoDisplay();
        }
        
        function updateTomatoDisplay() {
            const minutes = Math.floor(tomatoRemaining / 60);
            const seconds = tomatoRemaining % 60;
            document.getElementById('tomatoTime').textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            document.getElementById('tomatoCount').textContent = `已完成 ${tomatoCount} 个番茄`;
            
            const phaseText = tomatoType === 'work' ? '📖 专注时间' : (tomatoType === 'rest' ? '☕ 休息时间' : '🎉 长休息时间');
            document.getElementById('tomatoPhase').textContent = phaseText;
            
            const progress = ((tomatoTime - tomatoRemaining) / tomatoTime) * 100;
            document.getElementById('tomatoProgress').style.width = progress + '%';
        }
        
        function tomatoStartPause() {
            if (!tomatoRunning) {
                tomatoRunning = true;
                tomatoPaused = false;
                document.getElementById('tomatoStartBtn').innerHTML = '⏸ 暂停';
                tomatoUpdate();
                showSpeech("🍅 开始专注啦，加油！");
                showNotification("番茄钟已开始，专注25分钟~", 2000);
            } else if (tomatoPaused) {
                tomatoPaused = false;
                tomatoUpdate();
                document.getElementById('tomatoStartBtn').innerHTML = '⏸ 暂停';
                showSpeech("✨ 继续专注吧！");
            } else {
                tomatoPaused = true;
                document.getElementById('tomatoStartBtn').innerHTML = '▶ 继续';
                showSpeech("💤 休息一下，别太累哦。");
            }
        }
        
        function tomatoUpdate() {
            if (tomatoRunning && !tomatoPaused && tomatoRemaining > 0) {
                tomatoRemaining--;
                updateTomatoDisplay();
                tomatoInterval = setTimeout(tomatoUpdate, 1000);
            } else if (tomatoRemaining <= 0) {
                tomatoComplete();
            }
        }
        
        function tomatoComplete() {
            tomatoRunning = false;
            
            if (tomatoType === "work") {
                tomatoCount++;
                updateTomatoDisplay();
                
                if (tomatoCount % 4 === 0) {
                    tomatoTime = 15 * 60;
                    tomatoRemaining = 15 * 60;
                    tomatoType = "long_rest";
                    showSpeech("🎉 完成4个番茄啦！休息15分钟吧~");
                    showNotification("恭喜！完成4个番茄，休息15分钟！", 3000);
                } else {
                    tomatoTime = 5 * 60;
                    tomatoRemaining = 5 * 60;
                    tomatoType = "rest";
                    showSpeech("☕ 专注时间结束！休息5分钟吧~");
                    showNotification("番茄完成！休息5分钟~", 2000);
                }
            } else {
                tomatoTime = 25 * 60;
                tomatoRemaining = 25 * 60;
                tomatoType = "work";
                showSpeech("🌟 休息结束！开始新的专注吧！");
                showNotification("休息结束，开始新的番茄钟！", 2000);
            }
            
            document.getElementById('tomatoStartBtn').innerHTML = '▶ 开始';
            tomatoPaused = false;
            updateTomatoDisplay();
        }
        
        function tomatoReset() {
            if (tomatoInterval) clearTimeout(tomatoInterval);
            tomatoRunning = false;
            tomatoPaused = false;
            tomatoTime = 25 * 60;
            tomatoRemaining = 25 * 60;
            tomatoType = "work";
            document.getElementById('tomatoStartBtn').innerHTML = '▶ 开始';
            updateTomatoDisplay();
            showSpeech("🔄 番茄钟已重置。");
        }
        
        function closeTomato() {
            if (tomatoInterval) clearTimeout(tomatoInterval);
            tomatoRunning = false;
            tomatoModal.style.display = 'none';
            overlay.style.display = 'none';
        }
        
        document.getElementById('tomatoStartBtn').addEventListener('click', tomatoStartPause);
        document.getElementById('tomatoResetBtn').addEventListener('click', tomatoReset);
        document.getElementById('tomatoCloseBtn').addEventListener('click', closeTomato);
        overlay.addEventListener('click', closeTomato);
        
        // ==================== 其他功能 ====================
        function feedRabbit() {
            const foods = ["🥕 胡萝卜", "🥬 青菜", "🍎 苹果片", "🌿 兔粮"];
            const food = foods[Math.floor(Math.random() * foods.length)];
            showSpeech(`🐰 小乖开心地吃起了${food}！`);
            showNotification(`给小乖喂了${food}~`, 1500);
        }
        
        function showDiary() {
            const today = new Date();
            const diaryText = `📔 陈韶的日记\n${'━'.repeat(25)}\n${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日\n\n今天在阳光房看了很久的书...\n妈妈说晚饭做了组长套餐，\n不过我偷偷把芹菜挑出来了。\n\n小乖今天特别活泼，\n在客厅跳来跳去。\n\n哥哥说下周回来，\n要给我带封丘的特产。\n${'━'.repeat(25)}\n（日记本上还有更多内容）`;
            showSpeech(diaryText);
        }
        
        function randomAction() {
            const actions = ["😴 伸了个懒腰", "👀 揉了揉眼睛", "📖 翻了一页书", "🌤️ 看了看窗外", "🐰 摸了摸小乖的头", "✍️ 在笔记本上写了些什么"];
            const action = actions[Math.floor(Math.random() * actions.length)];
            showSpeech(action);
        }
        
        function showStatus() {
            const personalityName = personalities[currentPersonality].name;
            const statusText = `📊 陈韶的状态\n${'━'.repeat(25)}\n\n🎭 当前人格: ${personalityName}\n💬 对话次数: ${conversationHistory.length}\n🍅 番茄钟: 已完成 ${tomatoCount} 个\n✨ 特殊能力: 规则反伤\n🐰 小乖状态: 活泼\n\n${'━'.repeat(25)}\n💡 右键菜单可切换人格`;
            alert(statusText);
        }
        
        function sendHome() {
            showSpeech("🏠 嗯...该回家了，大家再见。");
            showNotification("小勺子要回家了~", 2000);
            setTimeout(() => {
                petContainer.style.transition = 'opacity 1s';
                petContainer.style.opacity = '0';
                setTimeout(() => {
                    window.close();
                    alert("感谢陪伴陈韶，期待下次见面！");
                }, 1000);
            }, 3000);
        }
        
        // ==================== 初始化 ====================
        loadImages();
        setTimeout(() => {
            showSpeech(personalities.normal.greeting);
        }, 500);
        
        // 定时保存状态
        setInterval(() => {
            localStorage.setItem('tomatoCount', tomatoCount);
            localStorage.setItem('personality', currentPersonality);
        }, 60000);
        
        // 加载保存的状态
        const savedCount = localStorage.getItem('tomatoCount');
        if (savedCount) tomatoCount = parseInt(savedCount);
        const savedPersonality = localStorage.getItem('personality');
        if (savedPersonality) {
            currentPersonality = savedPersonality;
            modeLabel.innerHTML = personalities[currentPersonality].icon + ' ' + personalities[currentPersonality].name;
        }
        
        // 更新状态显示
        statusIndicator.innerHTML = personalities[currentPersonality].icon + ' ' + personalities[currentPersonality].name;
        
        // 窗口大小适配
        window.addEventListener('resize', () => {
            let left = parseInt(petContainer.style.left);
            let top = parseInt(petContainer.style.top);
            left = Math.max(0, Math.min(window.innerWidth - petContainer.offsetWidth, left));
            top = Math.max(0, Math.min(window.innerHeight - petContainer.offsetHeight, top));
            petContainer.style.left = left + 'px';
            petContainer.style.top = top + 'px';
        });
        
        console.log('✨ 陈韶桌宠已启动！右键点击小勺子打开菜单~');
    </script>
</body>
</html>
